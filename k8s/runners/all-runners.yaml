# JavaScript Runner Pool
apiVersion: apps/v1
kind: Deployment
metadata:
  name: javascript-runner-pool
  namespace: testcraft-runners
  labels:
    app.kubernetes.io/name: testcraft
    app.kubernetes.io/component: runner-pool
    testcraft.io/language: javascript
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: testcraft
      testcraft.io/language: javascript
      testcraft.io/pool: warm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: testcraft
        app.kubernetes.io/component: runner
        testcraft.io/language: javascript
        testcraft.io/pool: warm
    spec:
      serviceAccountName: testcraft-runner
      containers:
        - name: runner
          image: testcraft/runner-javascript:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: CODE_DIR
              value: "/app/code"
            - name: OUTPUT_DIR
              value: "/app/output"
          volumeMounts:
            - name: code-volume
              mountPath: /app/code
            - name: output-volume
              mountPath: /app/output
      volumes:
        - name: code-volume
          emptyDir: {}
        - name: output-volume
          emptyDir: {}

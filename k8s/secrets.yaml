##
# Kubernetes Secrets for TestCraft AI
#
# IMPORTANT: This file contains placeholder values.
# In production, use one of these methods:
#   1. Sealed Secrets (bitnami-labs/sealed-secrets)
#   2. External Secrets Operator with Vault/AWS SM
#   3. SOPS encryption
#   4. kubectl create secret with values from secure storage
#
# To create secrets manually:
#   kubectl create secret generic testcraft-db-credentials \
#     --from-literal=DB_USER=<user> \
#     --from-literal=DB_PASSWORD=<password> \
#     -n testcraft
##

---
apiVersion: v1
kind: Secret
metadata:
  name: testcraft-db-credentials
  namespace: testcraft
  labels:
    app.kubernetes.io/name: testcraft
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Database credentials - REPLACE IN PRODUCTION
  DB_USER: "yugabyte"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

---
apiVersion: v1
kind: Secret
metadata:
  name: testcraft-jwt-secret
  namespace: testcraft
  labels:
    app.kubernetes.io/name: testcraft
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  # JWT signing key - MUST be changed in production
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_64"

---
apiVersion: v1
kind: Secret
metadata:
  name: testcraft-ai-credentials
  namespace: testcraft
  labels:
    app.kubernetes.io/name: testcraft
    app.kubernetes.io/component: ai
type: Opaque
stringData:
  # AI provider API keys - set based on your provider
  AI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: testcraft-tls
  namespace: testcraft
  labels:
    app.kubernetes.io/name: testcraft
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key (Self-signed dummy for dev)
  # Replace with your actual certificates
  # kubectl create secret tls testcraft-tls --cert=tls.crt --key=tls.key -n testcraft
  tls.crt: 
  tls.key: 

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testcraft-ingress
  namespace: testcraft
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: testcraft.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80

# HTTP API Test Plan
testcraft {
  version = "1.0"

  plan {
    name = "My API Test"
    description = "API test plan created with TestCraft CLI"
    tags = ["api", "smoke"]

    settings {
      defaultTimeout = "30s"
    }

    variables {
      baseUrl {
        type = string
        default = "http://localhost:3000"
        env = "API_BASE_URL"
      }
    }

    nodes = [
      {
        name = "API Tests"
        type = "thread-group"
        config {
          threads = 1
          loops = 1
        }
        children = [
          {
            name = "Health Check"
            type = "http-request"
            config {
              method = "GET"
              path = "/health"
            }
            children = [
              {
                name = "Verify Status 200"
                type = "response-assertion"
                config {
                  testField = "response-code"
                  pattern = "200"
                }
              }
            ]
          }
        ]
      }
    ]
  }
}
